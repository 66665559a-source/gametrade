<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10money - 게임 재화 시세 조회</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: #0f1923;
    color: #e0e6ed;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a2a3a 0%, #0d1b2a 100%);
    border-bottom: 1px solid #1e3a5f;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    color: #4fc3f7;
    letter-spacing: -0.5px;
  }
  .logo span { color: #ff8a65; }
  .header-nav { display: flex; gap: 24px; }
  .header-nav a {
    color: #8899aa;
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }
  .header-nav a:hover, .header-nav a.active { color: #4fc3f7; }

  /* Notice Bar */
  .notice-bar {
    background: #1a2a3a;
    border-bottom: 1px solid #1e3a5f;
    padding: 10px 20px;
    text-align: center;
    font-size: 13px;
    color: #ffab40;
  }

  /* Main */
  .main { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

  /* Game Tabs */
  .game-tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .game-tab {
    background: #1a2a3a;
    border: 1px solid #1e3a5f;
    border-radius: 10px;
    padding: 14px 24px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 160px;
  }
  .game-tab:hover { border-color: #4fc3f7; }
  .game-tab.active {
    border-color: #4fc3f7;
    background: linear-gradient(135deg, #1a3a5a 0%, #1a2a3a 100%);
    box-shadow: 0 0 20px rgba(79, 195, 247, 0.1);
  }
  .game-tab .game-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .game-tab .game-info { display: flex; flex-direction: column; }
  .game-tab .game-name { font-size: 15px; font-weight: 600; color: #e0e6ed; }
  .game-tab .game-unit { font-size: 11px; color: #6688aa; margin-top: 2px; }

  /* Section Title */
  .section-title {
    font-size: 14px;
    color: #6688aa;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Price Cards */
  .server-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .price-card {
    background: #152232;
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
  }
  .price-card:hover {
    border-color: #2a5a8f;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .server-name {
    font-size: 17px;
    font-weight: 600;
    color: #e0e6ed;
  }
  .status-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .status-badge.available {
    background: rgba(76, 175, 80, 0.15);
    color: #66bb6a;
    border: 1px solid rgba(76, 175, 80, 0.3);
  }
  .status-badge.soldout {
    background: rgba(255, 152, 0, 0.15);
    color: #ffa726;
    border: 1px solid rgba(255, 152, 0, 0.3);
  }
  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #1a2a3a;
  }
  .price-row:last-of-type { border-bottom: none; }
  .price-label {
    font-size: 13px;
    color: #6688aa;
  }
  .price-value {
    font-size: 20px;
    font-weight: 700;
  }
  .price-value.sell { color: #ef5350; }
  .price-unit {
    font-size: 12px;
    color: #6688aa;
    font-weight: 400;
    margin-left: 4px;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #1a2a3a;
  }
  .updated-time {
    font-size: 11px;
    color: #556677;
  }
  .card-buttons {
    display: flex;
    gap: 8px;
  }
  .btn-buy {
    background: linear-gradient(135deg, #ef5350, #c62828);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-buy:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(239, 83, 80, 0.4);
  }
  .btn-buy:disabled {
    background: #2a3a4a;
    color: #556677;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #152232;
    border: 1px solid #1e3a5f;
    border-radius: 16px;
    padding: 32px;
    width: 90%;
    max-width: 440px;
    position: relative;
  }
  .modal h2 {
    font-size: 20px;
    margin-bottom: 20px;
  }
  .modal h2.buy-title { color: #ef5350; }
  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: #6688aa;
    font-size: 24px;
    cursor: pointer;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 13px;
    color: #6688aa;
    margin-bottom: 6px;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 10px 14px;
    background: #0f1923;
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    color: #e0e6ed;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: #4fc3f7; }
  .form-group .readonly {
    background: #1a2a3a;
    color: #8899aa;
  }
  .estimate {
    background: #1a2a3a;
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    margin-bottom: 16px;
  }
  .estimate-label { font-size: 12px; color: #6688aa; }
  .estimate-value { font-size: 24px; font-weight: 700; color: #ffab40; margin-top: 4px; }
  .btn-submit {
    width: 100%;
    padding: 12px;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-submit.buy-submit {
    background: linear-gradient(135deg, #ef5350, #c62828);
  }
  .btn-submit.buy-submit:hover { box-shadow: 0 4px 16px rgba(239, 83, 80, 0.4); }

  /* All Prices Table */
  .all-prices-table {
    width: 100%;
    border-collapse: collapse;
    background: #152232;
    border-radius: 12px;
    overflow: hidden;
  }
  .all-prices-table th {
    background: #1a2a3a;
    padding: 12px 16px;
    text-align: left;
    font-size: 13px;
    color: #6688aa;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .all-prices-table th:hover { color: #4fc3f7; }
  .all-prices-table th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    font-size: 10px;
    color: #3a4a5a;
  }
  .all-prices-table th.sort-asc .sort-arrow { color: #4fc3f7; }
  .all-prices-table th.sort-desc .sort-arrow { color: #4fc3f7; }
  .all-prices-table td {
    padding: 12px 16px;
    border-bottom: 1px solid #1a2a3a;
    font-size: 14px;
  }
  .all-prices-table tr:hover td { background: rgba(79, 195, 247, 0.03); }

  /* Footer */
  .footer {
    border-top: 1px solid #1e3a5f;
    padding: 30px 20px;
    text-align: center;
    color: #3a4a5a;
    font-size: 12px;
    margin-top: 40px;
  }

  /* 신청 결과 알림 */
  .result-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .result-overlay.show { display: flex; }
  .result-box {
    background: #152232;
    border: 1px solid #1e3a5f;
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    min-width: 300px;
    max-width: 400px;
  }
  .result-icon { font-size: 48px; margin-bottom: 16px; }
  .result-message { font-size: 18px; font-weight: 600; color: #e0e6ed; margin-bottom: 24px; line-height: 1.5; }
  .result-btn {
    background: linear-gradient(135deg, #4fc3f7, #1e88e5);
    color: #fff;
    border: none;
    padding: 12px 40px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .result-btn:hover { box-shadow: 0 4px 16px rgba(79, 195, 247, 0.4); }
  /* Loading */
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0f1923;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.3s;
  }
  .loading-overlay.hide { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid #1e3a5f;
    border-top-color: #4fc3f7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #6688aa; font-size: 14px; margin-top: 14px; }
  .time-hint {
    font-size: 11px;
    color: #556677;
    margin-top: 4px;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .server-grid { grid-template-columns: 1fr; }
    .game-tabs { gap: 8px; }
    .game-tab { min-width: 140px; padding: 10px 16px; }
    .game-tab .game-icon { width: 32px; height: 32px; font-size: 16px; }
    .price-value { font-size: 18px; }
    .card-buttons { flex-direction: column; gap: 6px; }
    .submit-toast { right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">시세 데이터를 불러오는 중...</div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div class="logo">10<span>money</span></div>
    <div class="header-nav">
      <a href="#" class="active">시세 조회</a>
      <a href="#all-prices">전체 시세표</a>
      <a href="#">이용안내</a>
    </div>
  </div>
</div>

<!-- Notice -->
<div class="notice-bar" id="noticeBar">
  [공지] 데이터를 불러오는 중...
</div>

<!-- Main -->
<div class="main">

  <!-- Game Tabs (동적 생성) -->
  <div class="section-title">게임 선택</div>
  <div class="game-tabs" id="gameTabs"></div>

  <!-- Server Price Cards -->
  <div class="section-title" id="serverTitle">리니지 클래식 서버별 시세</div>
  <div class="server-grid" id="serverGrid"></div>

  <!-- All Prices (selected game only) -->
  <div id="all-prices" style="margin-top: 20px;">
    <div class="section-title" id="allPricesTitle">리니지 클래식 전체 시세표</div>
    <div style="border-radius: 12px; overflow: hidden; border: 1px solid #1e3a5f;">
      <table class="all-prices-table" id="allPricesTable">
        <thead>
          <tr>
            <th data-col="name" data-type="string" onclick="sortTable('name')">서버 <span class="sort-arrow">&#9650;&#9660;</span></th>
            <th data-col="sell" data-type="number" onclick="sortTable('sell')">가격 <span class="sort-arrow">&#9650;&#9660;</span></th>
            <th data-col="stock" data-type="number" onclick="sortTable('stock')">재고 <span class="sort-arrow">&#9650;&#9660;</span></th>
            <th data-col="unit" data-type="string" onclick="sortTable('unit')">단위 <span class="sort-arrow">&#9650;&#9660;</span></th>
            <th data-col="status" data-type="string" onclick="sortTable('status')">상태 <span class="sort-arrow">&#9650;&#9660;</span></th>
            <th data-col="updated" data-type="string" onclick="sortTable('updated')">업데이트 <span class="sort-arrow">&#9650;&#9660;</span></th>
          </tr>
        </thead>
        <tbody id="allPricesBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Buy Modal -->
<div class="modal-overlay" id="buyModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('buyModal')">&times;</button>
    <h2 class="buy-title">구매신청</h2>
    <div class="form-group">
      <label>게임</label>
      <input type="text" class="readonly" id="buyModalGame" readonly>
    </div>
    <div class="form-group">
      <label>서버</label>
      <input type="text" class="readonly" id="buyModalServer" readonly>
    </div>
    <div class="form-group">
      <label>단가</label>
      <input type="text" class="readonly" id="buyModalPrice" readonly>
    </div>
    <div class="form-group">
      <label>구매수량</label>
      <input type="number" id="buyModalAmount" placeholder="예: 5" min="1" oninput="calcEstimate('buy')">
    </div>
    <div class="estimate">
      <div class="estimate-label">예상 결제금액</div>
      <div class="estimate-value" id="buyEstimateValue">0원</div>
    </div>
    <div class="form-group">
      <label>캐릭터명</label>
      <input type="text" id="buyModalChar" placeholder="게임 내 캐릭터명">
    </div>
    <div class="form-group">
      <label>연락처</label>
      <input type="text" id="buyModalContact" placeholder="010-0000-0000">
    </div>
    <button class="btn-submit buy-submit" onclick="submitForm('buy')">구매신청</button>
  </div>
</div>

<!-- 신청 결과 알림 -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-message" id="resultMessage"></div>
    <button class="result-btn" onclick="document.getElementById('resultOverlay').classList.remove('show')">확인</button>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  &copy; 2026 10money. All rights reserved.
</div>

<script>

var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx4JLvHRzJ5SAul9FndY28k1n2ywki9qWuBC5C7WKR4gwtweygJqmEnELl4yeWA2l8y/exec';

};

// ===== 더미 데이터 (API 연결 전 폴백) =====
var FALLBACK_DATA = {

var FALLBACK_SETTINGS = {
  '매입_시작시간': '09:00',
  '매입_종료시간': '22:00',

};

var DATA = {};
var SETTINGS = {};
var currentGame = '';
var modalPrice = 0;
var currentSort = { col: null, dir: null };

// ============================================================
// 데이터 로드
// ============================================================

function loadData() {
  // 1차: fetch 시도
  fetch(APPS_SCRIPT_URL)
    .then(function(res) { return res.json(); })
    .then(function(result) {
      if (result.games && Object.keys(result.games).length > 0) {
        DATA = result.games;
        SETTINGS = result.settings || FALLBACK_SETTINGS;
      } else {
        useFallback();
      }
      initPage();
    })
    .catch(function() {
      // 2차: fetch 실패 시 JSONP 시도
      window._onDataLoaded = function(result) {
        if (result.games && Object.keys(result.games).length > 0) {
          DATA = result.games;
          SETTINGS = result.settings || FALLBACK_SETTINGS;
        } else {
          useFallback();
        }
        initPage();
        delete window._onDataLoaded;
      };
      var script = document.createElement('script');
      script.src = APPS_SCRIPT_URL + '?callback=_onDataLoaded';
      script.onerror = function() {
        useFallback();
        initPage();
      };
      document.body.appendChild(script);
    });
}

function useFallback() {
  DATA = {};
  SETTINGS = FALLBACK_SETTINGS;
  document.getElementById('loadingOverlay').innerHTML =
    '<div style="text-align:center;color:#ef5350;font-size:16px;padding:20px;">' +
    '시세 데이터를 불러올 수 없습니다.<br><br>' +
    '<button onclick="location.reload()" style="background:#1e3a5f;color:#4fc3f7;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;">다시 시도</button></div>';
  document.getElementById('loadingOverlay').classList.remove('hide');
}

function initPage() {
  document.getElementById('loadingOverlay').classList.add('hide');
  updateNotice();
  renderGameTabs();
  renderServers();
  renderAllPrices();
}

// ============================================================
// 공지 & 게임 탭 동적 생성
// ============================================================

function updateNotice() {
  var buyH = (SETTINGS['판매_시작시간'] || '10:00') + '~' + (SETTINGS['판매_종료시간'] || '21:00');
  var notice = SETTINGS['판매페이지_공지'] || '';
  document.getElementById('noticeBar').innerHTML =
    '[공지] 구매 가능시간: ' + buyH + (notice ? ' | ' + notice : '');
}

function renderGameTabs() {
  var container = document.getElementById('gameTabs');
  var gameIds = Object.keys(DATA).sort(function(a, b) {
    return (DATA[a].sort_order || 0) - (DATA[b].sort_order || 0);
  });
  if (gameIds.length === 0) return;
  if (!currentGame || !DATA[currentGame]) currentGame = gameIds[0];

  container.innerHTML = gameIds.map(function(id) {
    var g = DATA[id];
    var style = GAME_STYLE[id] || DEFAULT_STYLE;
    var active = id === currentGame ? ' active' : '';
    return '<div class="game-tab' + active + '" data-game="' + id + '" onclick="selectGame(\'' + id + '\')">' +
      '<div class="game-icon" style="background:' + style.gradient + ';">' + style.icon + '</div>' +
      '<div class="game-info">' +
        '<div class="game-name">' + g.name + '</div>' +
        '<div class="game-unit">거래단위: ' + g.unit + '</div>' +
      '</div></div>';
  }).join('');
}

// ============================================================
// 운영시간 체크
// ============================================================

function isOperatingHours(type) {
  var now = new Date();
  var cur = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  var start = SETTINGS[type + '_시작시간'] || '00:00';
  var end = SETTINGS[type + '_종료시간'] || '23:59';
  if (end < start) return cur >= start || cur <= end;
  return cur >= start && cur <= end;
}

function getHoursText(type) {
  return (SETTINGS[type + '_시작시간'] || '00:00') + '~' + (SETTINGS[type + '_종료시간'] || '23:59');
}

// ============================================================
// 게임 선택 =====
function selectGame(gameId) {
  currentGame = gameId;
  currentSort = { col: null, dir: null };
  document.querySelectorAll('.game-tab').forEach(function(t) { t.classList.remove('active'); });
  var tab = document.querySelector('.game-tab[data-game="' + gameId + '"]');
  if (tab) tab.classList.add('active');
  renderServers();
  renderAllPrices();
}

// ===== 서버 카드 렌더링 =====
function renderServers() {
  var game = DATA[currentGame];
  if (!game) return;
  document.getElementById('serverTitle').textContent = game.name + ' 서버별 시세';
  var grid = document.getElementById('serverGrid');
  var buyOpen = isOperatingHours('판매');

  grid.innerHTML = game.servers.map(function(s) {
    var hasStock = s.stock > 0;
    var statusText, statusClass;
    if (!hasStock) {
      statusText = '품절'; statusClass = 'soldout';
    } else if (!buyOpen) {
      statusText = '준비중'; statusClass = 'soldout';
    } else {
      statusText = '구매가능'; statusClass = 'available';
    }
    var buyDisabled = (!hasStock || !buyOpen) ? 'disabled' : '';
    var buyHint = !buyOpen ? '<div class="time-hint">' + getHoursText('판매') + ' 가능</div>' : '';

    return '<div class="price-card">' +
      '<div class="card-header">' +
        '<div class="server-name">' + s.name + '</div>' +
        '<span class="status-badge ' + statusClass + '">' + statusText + '</span>' +
      '</div>' +
      '<div class="price-row">' +
        '<span class="price-label">가격</span>' +
        '<span class="price-value sell">' + s.sell.toLocaleString() + '원<span class="price-unit">/ ' + game.unit + '</span></span>' +
      '</div>' +
      '<div class="price-row">' +
        '<span class="price-label">재고</span>' +
        '<span class="price-value" style="color:#ffab40;font-size:16px">' + s.stock.toLocaleString() + '<span class="price-unit"> ' + game.unit + '</span></span>' +
      '</div>' +
      '<div class="card-footer">' +
        '<span class="updated-time">' + s.updated + '</span>' +
        '<div class="card-buttons">' +
          '<div style="text-align:center"><button class="btn-buy" ' + buyDisabled + ' onclick="openBuyModal(\'' + game.name + '\',\'' + s.name + '\',' + s.sell + ',\'' + game.unit + '\',' + s.stock + ')">구매신청</button>' + buyHint + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ===== 전체 시세표 (선택된 게임만) =====
function renderAllPrices() {
  var game = DATA[currentGame];
  if (!game) return;
  document.getElementById('allPricesTitle').textContent = game.name + ' 전체 시세표';
  var buyOpen = isOperatingHours('판매');

  var servers = game.servers.slice();

  // 정렬 적용
  if (currentSort.col) {
    servers.sort(function(a, b) {
      var va, vb;
      switch (currentSort.col) {
        case 'name': va = a.name; vb = b.name; break;
        case 'sell': va = a.sell; vb = b.sell; break;
        case 'stock': va = a.stock; vb = b.stock; break;
        case 'unit': va = game.unit; vb = game.unit; break;
        case 'status':
          va = a.stock > 0 ? 0 : 1;
          vb = b.stock > 0 ? 0 : 1; break;
        case 'updated': va = a.updated; vb = b.updated; break;
        default: va = ''; vb = '';
      }
      if (typeof va === 'string') {
        var cmp = va.localeCompare(vb, 'ko');
        return currentSort.dir === 'asc' ? cmp : -cmp;
      } else {
        return currentSort.dir === 'asc' ? va - vb : vb - va;
      }
    });
  }

  // 헤더 정렬 표시 업데이트
  document.querySelectorAll('.all-prices-table th').forEach(function(th) {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === currentSort.col) {
      th.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });

  var tbody = document.getElementById('allPricesBody');
  var html = '';
  servers.forEach(function(s) {
    var hasStock = s.stock > 0;
    var statusText, statusClass;
    if (!hasStock) {
      statusText = '품절'; statusClass = 'soldout';
    } else if (!buyOpen) {
      statusText = '준비중'; statusClass = 'soldout';
    } else {
      statusText = '구매가능'; statusClass = 'available';
    }
    html += '<tr>' +
      '<td>' + s.name + '</td>' +
      '<td style="color:#ef5350;font-weight:600">' + s.sell.toLocaleString() + '원</td>' +
      '<td style="color:#ffab40;font-weight:600">' + s.stock.toLocaleString() + '</td>' +
      '<td style="color:#6688aa">' + game.unit + '</td>' +
      '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
      '<td style="color:#556677;font-size:12px">' + s.updated + '</td>' +
    '</tr>';
  });
  tbody.innerHTML = html;
}

// ===== 정렬 =====
function sortTable(col) {
  if (currentSort.col === col) {
    currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort.col = col;
    currentSort.dir = 'asc';
  }
  renderAllPrices();
}

// ===== 구매신청 모달 =====
function openBuyModal(gameName, serverName, sellPrice, unit, stock) {
  if (!isOperatingHours('판매')) return;
  modalPrice = sellPrice;
  document.getElementById('buyModalGame').value = gameName;
  document.getElementById('buyModalServer').value = serverName;
  document.getElementById('buyModalPrice').value = sellPrice.toLocaleString() + '원 / ' + unit;
  var amountEl = document.getElementById('buyModalAmount');
  amountEl.value = '';
  amountEl.max = stock;
  amountEl.placeholder = '최대 ' + stock.toLocaleString();
  document.getElementById('buyEstimateValue').textContent = '0원';
  document.getElementById('buyModalChar').value = '';
  document.getElementById('buyModalContact').value = '';
  document.getElementById('buyModal').classList.add('show');
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('show');
}

function calcEstimate(type) {
  var amountEl = document.getElementById(type + 'ModalAmount');
  var estimateEl = document.getElementById(type + 'EstimateValue');
  var amount = parseInt(amountEl.value) || 0;
  var total = amount * modalPrice;
  estimateEl.textContent = total.toLocaleString() + '원';
}

function submitForm(type) {
  var prefix = type + 'Modal';
  var char = document.getElementById(prefix + 'Char').value;
  var contact = document.getElementById(prefix + 'Contact').value;
  var amount = document.getElementById(prefix + 'Amount').value;

  if (!char || !contact || !amount) {
    alert('모든 항목을 입력해주세요.');
    return;
  }
  var minAmount = parseInt(SETTINGS['최소수량']) || 1;
  if ((parseInt(amount) || 0) < minAmount) {
    alert('최소 거래 수량은 ' + minAmount + '입니다.');
    return;
  }
  // 재고 초과 검증
  var maxStock = parseInt(document.getElementById('buyModalAmount').max) || 0;
  if ((parseInt(amount) || 0) > maxStock) {
    alert('재고(' + maxStock.toLocaleString() + ')를 초과할 수 없습니다.');
    return;
  }

  // 운영시간 재확인
  if (!isOperatingHours('판매')) return;

  var gameName = document.getElementById(prefix + 'Game').value;
  var serverName = document.getElementById(prefix + 'Server').value;
  var priceInfo = document.getElementById(prefix + 'Price').value;
  var total = (parseInt(amount) || 0) * modalPrice;

  // 현재 게임의 단위 가져오기
  var gameData = DATA[currentGame] || {};
  var unit = gameData.unit || '';

  // API 전송 payload
  var payload = {
    action: 'submit',
    type: '구매',
    game_name: gameName,
    server_name: serverName,
    amount: parseInt(amount) || 0,
    unit: unit,
    unit_price: modalPrice,
    total_price: total,
    character_name: char,
    contact: contact,
    bank_account: ''
  };

  closeModal(type + 'Modal');
  showSubmitToast('신청 전송 중...');

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload),
    redirect: 'follow'
  }).then(function(res) {
    return res.text();
  }).then(function(text) {
    try {
      var data = JSON.parse(text);
      if (data.success) {
        showSubmitToast('구매신청이 접수되었습니다.');
      } else {
        showSubmitToast('신청 실패: ' + (data.message || '알 수 없는 오류'), true);
      }
    } catch(e) {
      showSubmitToast('구매신청이 접수되었습니다.');
    }
  }).catch(function(err) {
    showSubmitToast('전송 실패: ' + err.message, true);
  });
}

// ===== 신청 결과 알림 =====
function showSubmitToast(message, isError) {
  document.getElementById('resultIcon').textContent = isError ? '\u274C' : '\u2705';
  document.getElementById('resultMessage').textContent = message;
  document.getElementById('resultOverlay').classList.add('show');
}

// 모달 바깥 클릭 시 닫기
document.getElementById('buyModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('buyModal');
});

// 초기화 - API 로드 시도, 실패 시 폴백 데이터 사용
loadData();
</script>
