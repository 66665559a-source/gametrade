<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameTrade Supply - 공급자 매입신청</title>
<meta name="robots" content="noindex, nofollow">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: #171614;
    color: #e0e6ed;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #242220 0%, #141312 100%);
    border-bottom: 1px solid #3a3632;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    color: #c9a96e;
    letter-spacing: -0.5px;
  }
  .logo span { color: #d4b87a; }
  .header-nav { display: flex; gap: 24px; }
  .header-nav a {
    color: #8899aa;
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }
  .header-nav a:hover, .header-nav a.active { color: #c9a96e; }

  /* Notice Bar */
  .notice-bar {
    background: #242220;
    border-bottom: 1px solid #3a3632;
    padding: 10px 20px;
    text-align: center;
    font-size: 13px;
    color: #ffab40;
  }

  /* Main */
  .main { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

  /* Game Tabs */
  .game-tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .game-tab {
    background: #242220;
    border: 1px solid #3a3632;
    border-radius: 10px;
    padding: 14px 24px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 160px;
  }
  .game-tab:hover { border-color: #c9a96e; }
  .game-tab.active {
    border-color: #c9a96e;
    background: linear-gradient(135deg, #2e2a27 0%, #242220 100%);
    box-shadow: 0 0 20px rgba(201, 169, 110, 0.1);
  }
  .game-tab .game-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .game-tab .game-info { display: flex; flex-direction: column; }
  .game-tab .game-name { font-size: 15px; font-weight: 600; color: #e0e6ed; }
  .game-tab .game-unit { font-size: 11px; color: #6688aa; margin-top: 2px; }

  /* Section Title */
  .section-title {
    font-size: 14px;
    color: #6688aa;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Price Cards */
  .server-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .price-card {
    background: #1e1c1a;
    border: 1px solid #3a3632;
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
  }
  .price-card:hover {
    border-color: #4a4540;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .server-name {
    font-size: 17px;
    font-weight: 600;
    color: #e0e6ed;
  }
  .status-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .status-badge.available {
    background: rgba(201, 169, 110, 0.15);
    color: #c9a96e;
    border: 1px solid rgba(201, 169, 110, 0.3);
  }
  .status-badge.no_buy {
    background: rgba(239, 83, 80, 0.15);
    color: #ef5350;
    border: 1px solid rgba(239, 83, 80, 0.3);
  }
  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #242220;
  }
  .price-row:last-of-type { border-bottom: none; }
  .price-label {
    font-size: 13px;
    color: #6688aa;
  }
  .price-value {
    font-size: 20px;
    font-weight: 700;
  }
  .price-value.buy { color: #c9a96e; }
  .price-unit {
    font-size: 12px;
    color: #6688aa;
    font-weight: 400;
    margin-left: 4px;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #242220;
  }
  .updated-time {
    font-size: 11px;
    color: #556677;
  }
  .card-buttons {
    display: flex;
    gap: 8px;
  }
  .btn-sell {
    background: linear-gradient(135deg, #c9a96e, #8a7340);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-sell:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(201, 169, 110, 0.4);
  }
  .btn-sell:disabled {
    background: #2a3a4a;
    color: #556677;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #1e1c1a;
    border: 1px solid #3a3632;
    border-radius: 16px;
    padding: 32px;
    width: 90%;
    max-width: 440px;
    position: relative;
  }
  .modal h2 {
    font-size: 20px;
    margin-bottom: 20px;
  }
  .modal h2.sell-title { color: #c9a96e; }
  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: #6688aa;
    font-size: 24px;
    cursor: pointer;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 13px;
    color: #6688aa;
    margin-bottom: 6px;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 10px 14px;
    background: #171614;
    border: 1px solid #3a3632;
    border-radius: 8px;
    color: #e0e6ed;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: #c9a96e; }
  .form-group .readonly {
    background: #242220;
    color: #8899aa;
  }
  .bank-row {
    display: flex;
    gap: 8px;
  }
  .bank-row select {
    width: 40%;
  }
  .bank-row input {
    width: 60%;
  }
  .estimate {
    background: #242220;
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    margin-bottom: 16px;
  }
  .estimate-label { font-size: 12px; color: #6688aa; }
  .estimate-value { font-size: 24px; font-weight: 700; color: #ffab40; margin-top: 4px; }
  .btn-submit {
    width: 100%;
    padding: 12px;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-submit.sell-submit {
    background: linear-gradient(135deg, #c9a96e, #8a7340);
  }
  .btn-submit.sell-submit:hover { box-shadow: 0 4px 16px rgba(201, 169, 110, 0.4); }

  /* All Prices Table */
  .all-prices-table {
    width: 100%;
    border-collapse: collapse;
    background: #1e1c1a;
    border-radius: 12px;
    overflow: hidden;
  }
  .all-prices-table th {
    background: #242220;
    padding: 12px 16px;
    text-align: left;
    font-size: 13px;
    color: #6688aa;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .all-prices-table th:hover { color: #c9a96e; }
  .all-prices-table th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    font-size: 10px;
    color: #3a4a5a;
  }
  .all-prices-table th.sort-asc .sort-arrow { color: #c9a96e; }
  .all-prices-table th.sort-desc .sort-arrow { color: #c9a96e; }
  .all-prices-table td {
    padding: 12px 16px;
    border-bottom: 1px solid #242220;
    font-size: 14px;
  }
  .all-prices-table tr:hover td { background: rgba(66, 165, 245, 0.03); }

  /* Footer */
  .footer {
    border-top: 1px solid #3a3632;
    padding: 30px 20px;
    text-align: center;
    color: #3a4a5a;
    font-size: 12px;
    margin-top: 40px;
  }

  /* 신청 완료 토스트 */
  .submit-toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #2a2725;
    color: #c9a96e;
    border: 1px solid #4a4540;
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 15px;
    font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    z-index: 300;
    transform: translateY(120%);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .submit-toast.show {
    transform: translateY(0);
    opacity: 1;
  }
  /* Loading */
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #171614;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.3s;
  }
  .loading-overlay.hide { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid #3a3632;
    border-top-color: #c9a96e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #6688aa; font-size: 14px; margin-top: 14px; }
  .time-hint {
    font-size: 11px;
    color: #556677;
    margin-top: 4px;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .server-grid { grid-template-columns: 1fr; }
    .game-tabs { gap: 8px; }
    .game-tab { min-width: 140px; padding: 10px 16px; }
    .game-tab .game-icon { width: 32px; height: 32px; font-size: 16px; }
    .price-value { font-size: 18px; }
    .card-buttons { flex-direction: column; gap: 6px; }
    .submit-toast { right: 16px; bottom: 16px; }
  }
</style>
</head>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">매입 데이터를 불러오는 중...</div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div class="logo">Game<span>Trade Supply</span></div>
    <div class="header-nav">
      <a href="#" class="active">매입 시세</a>
      <a href="#all-prices">전체 시세표</a>
      <a href="#">이용안내</a>
    </div>
  </div>
</div>

<!-- Notice -->
<div class="notice-bar" id="noticeBar">

          <option value="경남은행">경남은행</option>
          <option value="광주은행">광주은행</option>
          <option value="전북은행">전북은행</option>
          <option value="제주은행">제주은행</option>
        </select>
        <input type="text" id="sellModalAccount" placeholder="계좌번호">
      </div>
    </div>
    <button class="btn-submit sell-submit" onclick="submitForm('sell')">매입신청</button>
  </div>
</div>

<!-- 신청 완료 토스트 -->
<div class="submit-toast" id="submitToast">매입신청이 접수되었습니다.</div>

var modalPrice = 0;
var modalUnit = '';
var modalGameName = '';
var modalServerName = '';
var currentSort = { col: null, dir: null };

// ============================================================
// 데이터 로드
// ============================================================

function loadData() {
  window._onDataLoaded = function(result) {
    if (result.games && Object.keys(result.games).length > 0) {
      DATA = result.games;
      SETTINGS = result.settings || FALLBACK_SETTINGS;
    } else {
      useFallback();
    }
    initPage();
    delete window._onDataLoaded;
  };
  var script = document.createElement('script');
  script.src = APPS_SCRIPT_URL + '?callback=_onDataLoaded';
  script.onerror = function() {
    console.error('JSONP 로드 실패');
    useFallback();
    initPage();
  };
  document.body.appendChild(script);
}

function useFallback() {
  DATA = FALLBACK_DATA;
  SETTINGS = FALLBACK_SETTINGS;
}

function initPage() {
  document.getElementById('loadingOverlay').classList.add('hide');
  updateNotice();
  renderGameTabs();
  renderServers();
  renderAllPrices();
}

// ============================================================
// 공지 & 게임 탭 동적 생성
// ============================================================

function updateNotice() {
  var sellH = (SETTINGS['매입_시작시간'] || '09:00') + '~' + (SETTINGS['매입_종료시간'] || '22:00');
  var notice = SETTINGS['매입페이지_공지'] || '';
  document.getElementById('noticeBar').innerHTML =
    '[공지] 매입 가능시간: ' + sellH + (notice ? ' | ' + notice : '');
}

function renderGameTabs() {
  var container = document.getElementById('gameTabs');
  var gameIds = Object.keys(DATA).sort(function(a, b) {
    return (DATA[a].sort_order || 0) - (DATA[b].sort_order || 0);
  });
  if (gameIds.length === 0) return;
  if (!currentGame || !DATA[currentGame]) currentGame = gameIds[0];

  container.innerHTML = gameIds.map(function(id) {
    var g = DATA[id];
    var style = GAME_STYLE[id] || DEFAULT_STYLE;
    var active = id === currentGame ? ' active' : '';
    return '<div class="game-tab' + active + '" data-game="' + id + '" onclick="selectGame(\'' + id + '\')">' +
      '<div class="game-icon" style="background:' + style.gradient + ';">' + style.icon + '</div>' +
      '<div class="game-info">' +
        '<div class="game-name">' + g.name + '</div>' +
        '<div class="game-unit">거래단위: ' + g.unit + '</div>' +
      '</div></div>';
  }).join('');
}

// ============================================================
// 운영시간 체크
// ============================================================

function isOperatingHours(type) {
  var now = new Date();
  var cur = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  var start = SETTINGS[type + '_시작시간'] || '00:00';
  var end = SETTINGS[type + '_종료시간'] || '23:59';
  if (end < start) return cur >= start || cur <= end;
  return cur >= start && cur <= end;
}

function getHoursText(type) {
  return (SETTINGS[type + '_시작시간'] || '00:00') + '~' + (SETTINGS[type + '_종료시간'] || '23:59');
}

// ============================================================
// 게임 선택
// ============================================================
function selectGame(gameId) {
  currentGame = gameId;
  currentSort = { col: null, dir: null };
  document.querySelectorAll('.game-tab').forEach(function(t) { t.classList.remove('active'); });
  var tab = document.querySelector('.game-tab[data-game="' + gameId + '"]');
  if (tab) tab.classList.add('active');
  renderServers();
  renderAllPrices();
}

// ===== 서버 카드 렌더링 =====
function renderServers() {
  var game = DATA[currentGame];
  if (!game) return;
  document.getElementById('serverTitle').textContent = game.name + ' 서버별 매입가';
  var grid = document.getElementById('serverGrid');
  var sellOpen = isOperatingHours('매입');

  grid.innerHTML = game.servers.map(function(s) {
    var isBuyDisabled = !s.buyable || s.buy === 0;
    var statusText, statusClass;
    if (isBuyDisabled) {
      statusText = '매입불가'; statusClass = 'no_buy';
    } else if (!sellOpen) {
      statusText = '준비중'; statusClass = 'soldout';
    } else {
      statusText = '매입가능'; statusClass = 'available';
    }
    var btnDisabled = (isBuyDisabled || !sellOpen) ? 'disabled' : '';
    var btnText = isBuyDisabled ? '매입불가' : '매입신청';
    var sellHint = (!sellOpen && !isBuyDisabled) ? '<div class="time-hint">' + getHoursText('매입') + ' 가능</div>' : '';

    return '<div class="price-card">' +
      '<div class="card-header">' +
        '<div class="server-name">' + s.name + '</div>' +
        '<span class="status-badge ' + statusClass + '">' + statusText + '</span>' +
      '</div>' +
      '<div class="price-row">' +
        '<span class="price-label">매입가</span>' +
        '<span class="price-value buy">' + s.buy.toLocaleString() + '원<span class="price-unit">/ ' + game.unit + '</span></span>' +
      '</div>' +
      '<div class="card-footer">' +
        '<span class="updated-time">' + s.updated + '</span>' +
        '<div class="card-buttons">' +
          '<div style="text-align:center"><button class="btn-sell" ' + btnDisabled + ' onclick="openSellModal(\'' + game.name + '\',\'' + s.name + '\',' + s.buy + ',\'' + game.unit + '\')">' + btnText + '</button>' + sellHint + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ===== 전체 시세표 (선택된 게임만) =====
function renderAllPrices() {
  var game = DATA[currentGame];
  if (!game) return;
  document.getElementById('allPricesTitle').textContent = game.name + ' 전체 시세표';
  var sellOpen = isOperatingHours('매입');

  var servers = game.servers.slice();

  // 정렬 적용
  if (currentSort.col) {
    servers.sort(function(a, b) {
      var va, vb;
      switch (currentSort.col) {
        case 'name': va = a.name; vb = b.name; break;
        case 'buy': va = a.buy; vb = b.buy; break;
        case 'unit': va = game.unit; vb = game.unit; break;
        case 'status':
          va = a.buyable ? 0 : 1;
          vb = b.buyable ? 0 : 1; break;
        case 'updated': va = a.updated; vb = b.updated; break;
        default: va = ''; vb = '';
      }
      if (typeof va === 'string') {
        var cmp = va.localeCompare(vb, 'ko');
        return currentSort.dir === 'asc' ? cmp : -cmp;
      } else {
        return currentSort.dir === 'asc' ? va - vb : vb - va;
      }
    });
  }

  // 헤더 정렬 표시 업데이트
  document.querySelectorAll('.all-prices-table th').forEach(function(th) {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === currentSort.col) {
      th.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });

  var tbody = document.getElementById('allPricesBody');
  var html = '';
  servers.forEach(function(s) {
    var isBuyDisabled = !s.buyable || s.buy === 0;
    var statusText, statusClass;
    if (isBuyDisabled) {
      statusText = '매입불가'; statusClass = 'no_buy';
    } else if (!sellOpen) {
      statusText = '준비중'; statusClass = 'soldout';
    } else {
      statusText = '매입가능'; statusClass = 'available';
    }
    var priceColor = isBuyDisabled ? '#ef5350' : '#c9a96e';
    html += '<tr>' +
      '<td>' + s.name + '</td>' +
      '<td style="color:' + priceColor + ';font-weight:600">' + s.buy.toLocaleString() + '원</td>' +
      '<td style="color:#6688aa">' + game.unit + '</td>' +
      '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
      '<td style="color:#556677;font-size:12px">' + s.updated + '</td>' +
    '</tr>';
  });
  tbody.innerHTML = html;
}

// ===== 정렬 =====
function sortTable(col) {
  if (currentSort.col === col) {
    currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort.col = col;
    currentSort.dir = 'asc';
  }
  renderAllPrices();
}

// ===== 매입신청 모달 =====
function openSellModal(gameName, serverName, buyPrice, unit) {
  if (!isOperatingHours('매입')) {
    return;
  }
  modalPrice = buyPrice;
  modalUnit = unit;
  modalGameName = gameName;
  modalServerName = serverName;
  document.getElementById('sellModalGame').value = gameName;
  document.getElementById('sellModalServer').value = serverName;
  document.getElementById('sellModalPrice').value = buyPrice.toLocaleString() + '원 / ' + unit;
  var amountEl = document.getElementById('sellModalAmount');
  amountEl.value = '';
  amountEl.placeholder = '예: 5';
  document.getElementById('sellEstimateValue').textContent = '0원';
  document.getElementById('sellModalChar').value = '';
  document.getElementById('sellModalContact').value = '';
  document.getElementById('sellModalBank').value = '';
  document.getElementById('sellModalAccount').value = '';
  document.getElementById('sellModal').classList.add('show');
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('show');
}

function calcEstimate(type) {
  var amountEl = document.getElementById(type + 'ModalAmount');
  var estimateEl = document.getElementById(type + 'EstimateValue');
  var amount = parseInt(amountEl.value) || 0;
  var total = amount * modalPrice;
  estimateEl.textContent = total.toLocaleString() + '원';
}

function submitForm(type) {
  var prefix = type + 'Modal';
  var char = document.getElementById(prefix + 'Char').value;
  var contact = document.getElementById(prefix + 'Contact').value;
  var amount = document.getElementById(prefix + 'Amount').value;
  var bank = document.getElementById(prefix + 'Bank').value;
  var account = document.getElementById(prefix + 'Account').value;

  if (!char || !contact || !amount || !bank || !account) {
    alert('모든 항목을 입력해주세요.');
    return;
  }
  var minAmount = parseInt(SETTINGS['최소수량']) || 1;
  if ((parseInt(amount) || 0) < minAmount) {
    alert('최소 거래 수량은 ' + minAmount + '입니다.');
    return;
  }

  // 운영시간 재확인
  if (!isOperatingHours('매입')) {
    return;
  }

  var gameName = document.getElementById(prefix + 'Game').value;
  var serverName = document.getElementById(prefix + 'Server').value;
  var total = (parseInt(amount) || 0) * modalPrice;

  // 현재 게임의 단위 가져오기
  var gameData = DATA[currentGame] || {};
  var unit = gameData.unit || '';

  // API 전송 payload
  var payload = {
    action: 'submit',
    type: '판매',
    game_name: gameName,
    server_name: serverName,
    amount: parseInt(amount) || 0,
    unit: unit,
    unit_price: modalPrice,
    total_price: total,
    character_name: char,
    contact: contact,
    bank_account: bank + ' ' + account,
    source: 'supply'
  };

  closeModal(type + 'Modal');
  showSubmitToast('신청 전송 중...');

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload),
    redirect: 'follow'
  }).then(function(res) {
    return res.text();
  }).then(function(text) {
    try {
      var data = JSON.parse(text);
      if (data.success) {
        showSubmitToast('매입신청이 접수되었습니다.');
      } else {
        showSubmitToast('신청 실패: ' + (data.message || '알 수 없는 오류'));
      }
    } catch(e) {
      showSubmitToast('매입신청이 접수되었습니다.');
    }
  }).catch(function(err) {
    showSubmitToast('전송 실패: ' + err.message);
  });
}

// ===== 신청 완료 토스트 =====
function showSubmitToast(message) {
  var toast = document.getElementById('submitToast');
  toast.textContent = message || '매입신청이 접수되었습니다.';
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 3000);
}

// 모달 바깥 클릭 시 닫기
document.getElementById('sellModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('sellModal');
});

// 초기화 - API 로드 시도, 실패 시 폴백 데이터 사용
loadData();
</script>
</body>
</html>
